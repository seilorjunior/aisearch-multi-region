name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'
          cache: true
          cache-dependency-path: '**/*.csproj'

      - name: Restore dependencies
        run: |
          dotnet restore src/MultiRegionSearch.Tests/MultiRegionSearch.Tests.csproj
          dotnet restore src/MultiRegionSearch.IntegrationTests/MultiRegionSearch.IntegrationTests.csproj

      - name: Build
        run: |
          dotnet build src/MultiRegionSearch.Tests/MultiRegionSearch.Tests.csproj --no-restore --configuration Release
          dotnet build src/MultiRegionSearch.IntegrationTests/MultiRegionSearch.IntegrationTests.csproj --no-restore --configuration Release

      - name: Unit tests
        run: >
          dotnet test src/MultiRegionSearch.Tests/MultiRegionSearch.Tests.csproj
          --no-build
          --configuration Release
          --logger "trx;LogFileName=unit-results.trx"
          --logger "console;verbosity=normal"
          --results-directory ./test-results

      - name: Integration tests
        if: vars.AZURE_INTEGRATION_ENABLED == 'true'
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: >
          dotnet test src/MultiRegionSearch.IntegrationTests/MultiRegionSearch.IntegrationTests.csproj
          --no-build
          --configuration Release
          --logger "trx;LogFileName=integration-results.trx"
          --logger "console;verbosity=normal"
          --results-directory ./test-results

      - name: Upload test results
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: test-results
          path: ./test-results/*.trx
          retention-days: 7
